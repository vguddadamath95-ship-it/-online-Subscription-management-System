<!--
    Payment Success Page - Online Subscription Management System
-->
{% extends 'base.html' %}
{% block title %}Payment Success{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="payment-card payment-success">
                    <div class="success-icon"><i class="bi bi-check-lg"></i></div>
                    <h3 class="fw-bold mb-2">Payment Successful!</h3>
                    <p class="text-muted mb-4">Your subscription has been activated successfully.</p>
                    <div class="card p-3 mb-4 text-start" style="background: #f8f9fd;">
                        <div class="d-flex justify-content-between mb-2"><span class="text-muted">Plan:</span><span class="fw-bold">{{ plan_name }}</span></div>
                        <div class="d-flex justify-content-between mb-2"><span class="text-muted">Amount Paid:</span><span class="fw-bold text-success">₹{{ amount }}</span></div>
                        <div class="d-flex justify-content-between"><span class="text-muted">Date:</span><span>{{ date }}</span></div>
                    </div>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary"><i class="bi bi-speedometer2 me-2"></i>Go to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
