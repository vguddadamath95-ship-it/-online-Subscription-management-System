<!--
    Login Page - Online Subscription Management System
    Allows registered users to log in to their account.
-->
{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <!-- Login Icon -->
        <div class="auth-icon">
            <i class="bi bi-box-arrow-in-right"></i>
        </div>

        <h2 class="text-center">Welcome Back</h2>
        <p class="text-center text-muted mb-4">Login to your account</p>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('login') }}" onsubmit="return validateLoginForm()">
            <!-- Email Field -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="Enter your email" required>
                </div>
            </div>

            <!-- Password Field -->
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Enter your password" required>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>

        <!-- Register Link -->
        <p class="text-center text-muted mb-0">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </p>
    </div>
</div>

{% endblock %}
