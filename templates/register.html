<!--
    Register Page - Online Subscription Management System
    Allows new users to create an account.
-->
{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <!-- Register Icon -->
        <div class="auth-icon">
            <i class="bi bi-person-plus"></i>
        </div>

        <h2 class="text-center">Create Account</h2>
        <p class="text-center text-muted mb-4">Join us and start managing subscriptions</p>

        <!-- Registration Form -->
        <form method="POST" action="{{ url_for('register') }}" onsubmit="return validateRegisterForm()">
            <!-- Name Field -->
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="name" name="name" 
                           placeholder="Enter your full name" required>
                </div>
            </div>

            <!-- Email Field -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="Enter your email" required>
                </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Min 6 characters" required minlength="6">
                </div>
            </div>

            <!-- Confirm Password Field -->
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                           placeholder="Re-enter your password" required>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-person-plus me-2"></i>Register
            </button>
        </form>

        <!-- Login Link -->
        <p class="text-center text-muted mb-0">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</div>

{% endblock %}
