<!--
    Edit Plan Page - Online Subscription Management System
-->
{% extends 'base.html' %}
{% block title %}Edit Plan{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="fw-bold mb-4"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Plan</h4>
                    <form method="POST" action="{{ url_for('edit_plan', plan_id=plan[0]) }}" onsubmit="return validatePlanForm()">
                        <div class="mb-3">
                            <label for="plan_name" class="form-label">Plan Name</label>
                            <input type="text" class="form-control" id="plan_name" name="plan_name" value="{{ plan[1] }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (₹)</label>
                            <input type="number" class="form-control" id="price" name="price" value="{{ plan[2] }}" required min="0" step="0.01">
                        </div>
                        <div class="mb-3">
                            <label for="duration" class="form-label">Duration (days)</label>
                            <input type="number" class="form-control" id="duration" name="duration" value="{{ plan[3] }}" required min="1">
                        </div>
                        <div class="mb-3">
                            <label for="features" class="form-label">Features (comma separated)</label>
                            <textarea class="form-control" id="features" name="features" rows="3" required>{{ plan[4] }}</textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-check-circle me-2"></i>Update Plan</button>
                            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary flex-fill"><i class="bi bi-arrow-left me-2"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
